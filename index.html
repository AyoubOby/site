<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Dashboard</title>
    <link href="https://cloudflare.com" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="1.png">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        header {
            margin: 60px 0 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .container {
            width: 90%;
            max-width: 1000px;
        }

        /* Grille des sites */
        #sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .site-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .site-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
        }

        .site-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        .site-card span {
            font-weight: 500;
            font-size: 1.1rem;
        }

        /* Bouton Ajouter */
        .add-btn {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 40px;
            transition: opacity 0.2s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .add-btn:hover { opacity: 0.9; }

        /* Animation d'entrée */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .site-card { animation: fadeIn 0.5s ease backwards; }
        /* Style du bouton de contact flottant */
    .contact-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #e1306c; /* Couleur Instagram */
        color: white;
        padding: 12px 20px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 5px 20px rgba(225, 48, 108, 0.4);
        transition: all 0.3s ease;
        z-index: 1000;
    }

    .contact-btn:hover {
        transform: scale(1.1);
        background: #bc2a8d;
        box-shadow: 0 8px 25px rgba(225, 48, 108, 0.6);
    }
 
    .contact-btn i {
       font-size: 1.4rem;
    }

/* Adaptation pour mobile */
    @media (max-width: 600px) {
        .contact-btn {
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 0.8rem;
        }
    }

    </style>
</head>
<body>

    <script>
        function addNewSite() {
            const name = prompt("Nom du site :");
            let url = prompt("Lien URL (ex: google.com) :");

            if (name && url) {
                // S'assurer que l'URL commence par http
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }

                const grid = document.getElementById('sites-grid');
                
                // Création de l'élément
                const newCard = document.createElement('a');
                newCard.href = url;
                newCard.target = "_blank";
                newCard.className = "site-card";
                newCard.innerHTML = `
                    <i class="fas fa-link"></i>
                    <span>${name}</span>
                `;
                
                grid.appendChild(newCard);
            }
        }
    </script>

</html>
